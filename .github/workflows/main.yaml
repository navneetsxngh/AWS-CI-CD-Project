name: CI/CD Pipeline — Student Performance Prediction

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: student-performance-app       # Change to your ECR repo name
  EB_APPLICATION_NAME: ml-student-performance   # Change to your EB app name
  EB_ENVIRONMENT_NAME: ml-student-env           # Change to your EB environment name
  PYTHON_VERSION: "3.13"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Continuous Integration
  # ─────────────────────────────────────────────
  build-and-test:
    name: 🔍 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Install project package (setup.py)
        run: pip install -e .

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 src/ application.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (non-blocking)
          flake8 src/ application.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests (if any)
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v
          else
            echo "No tests directory found — skipping pytest."
          fi

  # ─────────────────────────────────────────────
  # JOB 2 — Build & Push Docker Image to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }} \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Output image URI
        run: |
          echo "✅ Image pushed: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}"

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy to AWS Elastic Beanstalk
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS Elastic Beanstalk CLI
        run: |
          pip install awsebcli --quiet

      - name: Create deployment package (zip)
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "notebooks/*" \
            --exclude "catboost_info/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "venv/*" \
            --exclude ".env"

      - name: Upload deployment bundle to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BUNDLE_KEY="deployments/deploy-${TIMESTAMP}-${{ github.sha }}.zip"
          aws s3 cp deploy.zip s3://${{ secrets.EB_S3_BUCKET }}/${BUNDLE_KEY}
          echo "BUNDLE_KEY=${BUNDLE_KEY}" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Create new Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --version-label "v-${{ env.TIMESTAMP }}-${{ github.sha }}" \
            --source-bundle S3Bucket="${{ secrets.EB_S3_BUCKET }}",S3Key="${{ env.BUNDLE_KEY }}" \
            --description "Deployed via GitHub Actions — commit ${{ github.sha }}"

      - name: Deploy to Elastic Beanstalk environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --environment-name "${{ env.EB_ENVIRONMENT_NAME }}" \
            --version-label "v-${{ env.TIMESTAMP }}-${{ github.sha }}"

      - name: Wait for environment to be ready
        run: |
          echo "Waiting for Elastic Beanstalk environment to become healthy..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --environment-names "${{ env.EB_ENVIRONMENT_NAME }}"
          echo "✅ Deployment complete!"

      - name: Print environment URL
        run: |
          URL=$(aws elasticbeanstalk describe-environments \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --environment-names "${{ env.EB_ENVIRONMENT_NAME }}" \
            --query "Environments[0].CNAME" \
            --output text)
          echo "🌐 App is live at: http://${URL}"