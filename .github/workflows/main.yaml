name: CI/CD Pipeline — ScoreIQ (Student Performance Prediction)

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Shared environment variables ──────────────────────────────────────────────
env:
  AWS_REGION: ap-south-1                  # Region from README (ap-south-1)
  ECR_REPOSITORY: scoreiq-app            # Match pyproject.toml name "scoreiq"
  EB_APPLICATION_NAME: ml-student-performance   # Your EB app name
  EB_ENVIRONMENT_NAME: ml-student-env           # Your EB environment name
  # Dockerfile uses python:3.13-slim; pyproject.toml requires >=3.10
  PYTHON_VERSION: "3.13"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Test (CI)
  # Runs on every push and every PR to main
  # ─────────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: 🔍 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python version matches Dockerfile base image (python:3.13-slim)
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # pyproject.toml uses setuptools as build backend → pip install -e . works
      - name: Install project package (editable)
        run: pip install -e .

      - name: Install linting tools
        run: pip install flake8

      # Lint src/ and application.py (entry point named in README)
      # NOTE: Dockerfile CMD says "python app.py" but README says application.py
      #       Linting both to surface any discrepancy
      - name: Lint — hard errors (syntax / undefined names)
        run: |
          flake8 src/ application.py \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Lint — style warnings (non-blocking)
        run: |
          flake8 src/ application.py \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=120 \
            --statistics

      # No tests/ directory exists in the repo — step is present but skipped safely
      - name: Run tests (skipped — no tests/ directory in repo)
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest tests/ -v --tb=short
          else
            echo "⚠️  No tests/ directory found — skipping pytest."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build Docker image & push to Amazon ECR
  # Runs only on direct pushes to main (not on PRs)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push to ECR
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Short SHA tag for traceability + "latest" for EB Dockerrun reference
      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      # .dockerignore already excludes: artifacts/, *.pkl, *.joblib, models/,
      # data/, datasets/, __pycache__/, .env, venv/, notebooks/, catboost_info/
      # No extra --build-arg needed; image runs python:3.13-slim with CMD app.py
      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            --tag "${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}" \
            --tag "${REGISTRY}/${{ env.ECR_REPOSITORY }}:latest" \
            --file Dockerfile \
            .

      - name: Push Docker image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker push "${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"
          docker push "${REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"
          echo "✅ Pushed: ${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to AWS Elastic Beanstalk (Docker platform)
  #
  # Strategy: create a Dockerrun.aws.json v2 that points EB to the ECR image
  # that was just pushed. This avoids needing .ebextensions/ (absent from repo)
  # and matches how Docker-based EB environments actually work.
  #
  # Runs only on direct pushes to main, after ECR push succeeds.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR (needed for image URI)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build a minimal Dockerrun.aws.json pointing to the freshly-pushed image.
      # EB Docker platform picks this up automatically as the deployment manifest.
      - name: Generate Dockerrun.aws.json
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          cat > Dockerrun.aws.json <<EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}",
              "Update": "true"
            },
            "Ports": [
              { "ContainerPort": 5000, "HostPort": 80 }
            ],
            "Logging": "/var/log/app"
          }
          EOF
          echo "Dockerrun.aws.json:"
          cat Dockerrun.aws.json

      # Zip only what EB needs: the Dockerrun manifest.
      # All app code is already baked into the Docker image.
      # Excluded by .dockerignore (already verified): artifacts/, catboost_info/,
      # notebooks/, *.pkl, *.joblib, __pycache__/, .env, venv/
      - name: Create EB deployment bundle
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          zip deploy-${TIMESTAMP}.zip Dockerrun.aws.json
          echo "BUNDLE=deploy-${TIMESTAMP}.zip" >> $GITHUB_ENV

      - name: Upload bundle to S3
        run: |
          BUNDLE_KEY="eb-deployments/${BUNDLE}"
          aws s3 cp "${BUNDLE}" "s3://${{ secrets.EB_S3_BUCKET }}/${BUNDLE_KEY}"
          echo "BUNDLE_KEY=${BUNDLE_KEY}" >> $GITHUB_ENV

      - name: Create Elastic Beanstalk application version
        run: |
          VERSION_LABEL="v-${TIMESTAMP}-${{ github.sha }}"
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle "S3Bucket=${{ secrets.EB_S3_BUCKET }},S3Key=${BUNDLE_KEY}" \
            --description "GitHub Actions deploy — commit ${{ github.sha }}"
          echo "VERSION_LABEL=${VERSION_LABEL}" >> $GITHUB_ENV

      - name: Deploy application version to EB environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --environment-name "${{ env.EB_ENVIRONMENT_NAME }}" \
            --version-label "${VERSION_LABEL}"

      - name: Wait for EB environment to become healthy
        run: |
          echo "Polling Elastic Beanstalk until environment is Ready..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --environment-names "${{ env.EB_ENVIRONMENT_NAME }}"
          echo "✅ Deployment complete!"

      - name: Print live URL
        run: |
          CNAME=$(aws elasticbeanstalk describe-environments \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --environment-names "${{ env.EB_ENVIRONMENT_NAME }}" \
            --query "Environments[0].CNAME" \
            --output text)
          echo "🌐 App is live at: http://${CNAME}"